<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Glow Wear Cart</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>

    body{
      background:#f5f5f5;
      font-family:Arial;
    }

    .navbar{
      background:#111;
      padding:15px;
    }

    .brand{
      color:white;
      font-size:28px;
      font-weight:bold;
      text-decoration:none;
    }

    .cart-container{
      padding:40px 0;
    }

    .cart-card{
      background:white;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
      margin-bottom:25px;
    }

    .cart-card img{
      height:220px;
      object-fit:cover;
    }

    .cart-body{
      padding:20px;
    }

    .product-name{
      font-size:24px;
      font-weight:bold;
    }

    .product-price{
      color:hotpink;
      font-size:22px;
      font-weight:bold;
    }

    .remove-btn{
      background:red;
      color:white;
      border:none;
      padding:10px 20px;
      border-radius:30px;
      margin-top:15px;
    }

    .summary-box{
      background:white;
      padding:30px;
      border-radius:20px;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
      position:sticky;
      top:30px;
    }

    .checkout-btn{
      width:100%;
      background:linear-gradient(45deg,hotpink,purple);
      color:white;
      border:none;
      padding:15px;
      border-radius:40px;
      font-size:20px;
      font-weight:bold;
      margin-top:20px;
    }

    .empty-cart{
      text-align:center;
      padding:100px 20px;
      color:#777;
    }

  </style>

</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">

    <div class="container">

      <a href="index.html"
         class="brand">

        <i class="bi bi-arrow-left"></i>
        Glow Wear Cart

      </a>

    </div>

  </nav>

  <!-- CART -->
  <div class="container cart-container">

    <div class="row">

      <!-- PRODUCTS -->
      <div class="col-lg-8">

        <div id="cartItems"></div>

      </div>

      <!-- SUMMARY -->
      <div class="col-lg-4">

        <div class="summary-box">

          <h3>Order Summary</h3>

          <hr>

          <h4>
            Total:
            <span id="totalPrice">
              KSh 0
            </span>
          </h4>

          <button class="checkout-btn"
                  onclick="checkout()">

            Pay Now

          </button>

        </div>

      </div>

    </div>

  </div>

  <script>

    let cart =
      JSON.parse(localStorage.getItem("cart")) || [];

    const cartItems =
      document.getElementById("cartItems");

    const totalPrice =
      document.getElementById("totalPrice");

    renderCart();

    function renderCart(){

      cartItems.innerHTML = "";

      let total = 0;

      if(cart.length === 0){

        cartItems.innerHTML = `
          <div class="empty-cart">

            <h2>
              Your cart is empty
            </h2>

          </div>
        `;

      }

      cart.forEach((item,index) => {

        total += item.price;

        cartItems.innerHTML += `

          <div class="cart-card">

            <img src="${item.image}"
                 class="w-100">

            <div class="cart-body">

              <div class="product-name">
                ${item.name}
              </div>

              <div class="product-price">
                KSh ${item.price.toLocaleString()}
              </div>

              <button class="remove-btn"
                      onclick="removeItem(${index})">

                Remove

              </button>

            </div>

          </div>

        `;

      });

      totalPrice.innerText =
        "KSh " + total.toLocaleString();

    }

    function removeItem(index){

      cart.splice(index,1);

      localStorage.setItem(
        "cart",
        JSON.stringify(cart)
      );

      renderCart();

    }

    function checkout(){

      let total = 0;

      cart.forEach(item => {

        total += item.price;

      });

      alert(
`OPEN MPESA

1. Open MPESA
2. Lipa Na MPESA
3. Pochi La Biashara

NUMBER:
+254708592751

AMOUNT:
KSh ${total.toLocaleString()}`
      );

    }

  </script>

</body>
</html>
